# experiment name
EXP_NAME: OCT_SRGAN_x4_2
LOG_DIR: "."
# random number seed
SEED: 123
# super resolution magnification factor
SCALE: 4
# run device model
DEVICE_ID: 0

# Model define
MODEL:
  EMA:
    ENABLE: True
    DECAY: 0.999
    COMPILED: True
  G:
    NAME: srresnet_x4
    IN_CHANNELS: 3
    OUT_CHANNELS: 3
    CHANNELS: 64
    NUM_RCB: 16
    COMPILED: True
  D:
    NAME: discriminator_for_vgg
    IN_CHANNELS: 3
    OUT_CHANNELS: 1
    CHANNELS: 64
    COMPILED: False

TRAIN:
  DATASET:
    TRAIN_GT_IMAGES_DIR: "~/.cache/kagglehub/datasets/paultimothymooney/kermany2018/versions/2/oct2017/OCT2017 /train"
    GT_IMAGE_SIZE: 128

  # Model file address, used for pre-training and recovery training
  CHECKPOINT:
    PRETRAINED_G_MODEL: "results/pretrained_models/SRGAN_x4-ImageNet.pth.tar"
    PRETRAINED_D_MODEL: "results/pretrained_models/DiscriminatorForVGG_x4-ImageNet.pth.tar"
    RESUMED_G_MODEL: ""
    RESUMED_D_MODEL: ""

  # training hyperparameters
  HYP:
    EPOCHS: 100
    IMGS_PER_BATCH: 16
    SHUFFLE: True
    NUM_WORKERS: 8
    PIN_MEMORY: True
    PERSISTENT_WORKERS: True

  OPTIM:
    NAME: Adam
    LR: 0.0001
    D_LR: 0.00005  # Lower learning rate for discriminator
    BETAS: [ 0.9, 0.999 ]
    EPS: 0.00000001
    WEIGHT_DECAY: 0.0

  LR_SCHEDULER:
    NAME: MultiStepLR
    MILESTONES: [ 50, 75 ]
    GAMMA: 0.1

  # Loss function
  LOSSES:
    PIXEL_LOSS:
      NAME: MSELoss
      WEIGHT: [ 1.0 ]
    CONTENT_LOSS:
      NAME: ContentLoss
      NET_CFG_NAME: "vgg19"
      BATCH_NORM: False
      NUM_CLASSES: 4
      MODEL_WEIGHTS_PATH: ""
      FEATURE_NODES: [ "features.35" ]
      FEATURE_NORMALIZE_MEAN: [ 0.485, 0.456, 0.406 ]
      FEATURE_NORMALIZE_STD: [ 0.229, 0.224, 0.225 ]
      WEIGHT: [ 0.5 ]
    ADVERSARIAL_LOSS:
      NAME: vanilla
      WEIGHT: [ 0.001 ]  # Reduced adversarial weight
      GP_WEIGHT: 10.0    # Gradient penalty weight

  PRINT_FREQ: 100

TEST:
  DATASET:
    PAIRED_TEST_GT_IMAGES_DIR: "~/.cache/kagglehub/datasets/paultimothymooney/kermany2018/versions/2/oct2017/OCT2017 /val"
    PAIRED_TEST_LR_IMAGES_DIR: "~/.cache/kagglehub/datasets/paultimothymooney/kermany2018/versions/2/oct2017/OCT2017 /val"

  # Test hyperparameters
  HYP:
    IMGS_PER_BATCH: 32
    SHUFFLE: True
    NUM_WORKERS: 8
    PIN_MEMORY: True
    PERSISTENT_WORKERS: True

  # Only test Y channel
  ONLY_TEST_Y_CHANNEL: False